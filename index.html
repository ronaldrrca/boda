<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lili & Paul</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">
</head>
<body>
    <header></header>
    <main class="main">
        <img class="main__imgBackground__left" src="./assets/main_background_left.png" alt="rama de hojas verdes oscuras y claras">
        <img class="main__imgBackground__right" src="./assets/main_background_right.png" alt="rama de hojas verdes oscuras y claras">
        <section class="presentacion">
            <img id="presentacion__logoNovios" src="./assets/logo.png" alt="logo con las iniciales de los novios">
            <div class="presentacion__nombresNovios">
                <span class="presentacion__nombresNovios__letraCapital">L</span><span class="presentacion__nombresNovios">lili</span>
                &nbsp; &nbsp; &nbsp; &nbsp; <span>&</span> &nbsp; &nbsp; &nbsp; &nbsp; 
                <span class="presentacion__nombresNovios__letraCapital">P</span><span class="presentacion__nombresNovios">aul</span>
            </div>
            <audio class="presentacion__reproductorDeAudio" controls loop>
                <source src="la-boda.mp3" type="audio/mpeg">
                Tu navegador no soporta este componente de audio.
            </audio>
            <img class="presentacion__foto" src="./assets/foto1.webp" alt="novios en la playa">
        </section>
        <section class="informacion">
            
        </section>
        <section class="descripcion"></section>
    </main>
    <footer></footer>
    <script src="app.js"></script>
</body>
</html>
